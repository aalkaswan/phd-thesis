name: Build PhD Thesis

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache and install LaTeX dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: texlive-full latexmk librsvg2-bin ghostscript
        version: 1.0

    - name: Build thesis
      run: |
        cd /home/runner/work/phd-thesis/phd-thesis
        make all

    - name: Upload PDFs to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dissertation.pdf
          propositions.pdf
          dissertation_print.pdf
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
