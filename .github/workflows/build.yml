name: Build PhD Thesis

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Cache and install LaTeX dependencies
      uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05
      with:
        packages: texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra texlive-latex-recommended texlive-lang-european texlive-science latexmk dvipng graphviz librsvg2-bin ghostscript
        version: 1.0
    - name: Install dependencies that cannot be cached
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          texlive-xetex

    - name: Build thesis
      run: |
        cd /home/runner/work/phd-thesis/phd-thesis
        make all

    - name: Upload PDFs to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dissertation.pdf
          propositions.pdf
          dissertation_print.pdf
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
