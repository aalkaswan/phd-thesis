name: Build PhD Thesis

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache APT dependencies
      uses: actions/cache@v4
      with:
        path: /var/cache/apt
        key: ${{ runner.os }}-apt-${{ hashFiles('**/Makefile') }}

    - name: Install LaTeX and dependencies
      if: steps.cache-apt.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-fonts-recommended \
          texlive-fonts-extra \
          texlive-latex-extra \
          texlive-latex-recommended \
          texlive-xetex \
          texlive-lang-european \
          texlive-science \
          texlive-math-extra \
          latexmk \
          dvipng \
          graphviz \
          librsvg2-bin \
          ghostscript

    - name: Build thesis
      run: |
        cd /home/runner/work/phd-thesis/phd-thesis
        make all

    - name: Upload PDFs to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dissertation.pdf
          propositions.pdf
          dissertation_print.pdf
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
